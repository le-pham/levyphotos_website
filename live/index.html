<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Event Gallery | Levy Photos</title>
    <meta name="description" content="Access your live event gallery. Enter your event code to view and download your professional portraits instantly.">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Live Event Gallery | Levy Photos">
    <meta property="og:description" content="Enter your event code to view and download your professional portraits instantly.">
    <meta property="og:image" content="https://levyphotos.com/og-image.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffffff;
            --secondary: #cccccc;
            --accent: #007AFF; 
            --slate-btn: #2c2c2e; 
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --input-bg: #000000;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 60px 20px;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 25px;
        }

        .logo span { color: var(--accent); }

        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            font-weight: 400;
            font-size: 12px;
            margin-top: 60px;
            transition: opacity 0.2s;
            opacity: 0.5;
            letter-spacing: 1px;
        }

        .back-link:hover { opacity: 1; color: var(--accent); }

        .about-top {
            font-size: 18px;
            line-height: 1.6;
            opacity: 0.9;
            margin-bottom: 45px;
        }

        .section-box {
            background: var(--card-bg);
            padding: 35px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            display: block;
        }

        label {
            display: block;
            text-align: left;
            font-size: 13px;
            margin-bottom: 10px;
            opacity: 0.7;
            font-weight: 700;
            letter-spacing: 1px;
        }

        input, textarea {
            width: 100%;
            padding: 18px;
            margin-bottom: 25px;
            border-radius: 12px;
            border: 1px solid #444;
            background: var(--input-bg);
            color: white;
            font-size: 18px;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea { height: 360px; resize: none; }

        button {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
        }

        .btn-tip {
            background: var(--slate-btn);
            text-decoration: none;
            display: block;
            padding: 18px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 18px;
            margin-top: 15px;
            border: 1px solid #444;
        }

        footer { padding: 40px; font-size: 13px; opacity: 0.6; }
        .error-msg { color: #ff453a; display: none; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <a href="/" style="text-decoration: none; color: inherit;">
            <div class="logo">LEVY<span>PHOTOS</span></div>
        </a>
        
        <div class="about-top">
            We provide studio-quality portraits<br>
            delivered instantly to your device<br> 
            at high-end weddings and events.
        </div>
        
        <div class="section-box">
            <span class="section-title">Access Your Event Gallery</span>
            <input type="text" id="eventCode" placeholder="ENTER EVENT CODE" style="text-align: center; text-transform: uppercase;">
            <button onclick="checkCode()">VIEW PHOTOS</button>
            <div id="error" class="error-msg">Code not found.</div>
            
            <div style="margin-top: 40px; border-top: 1px solid #333; padding-top: 30px;">
                <div style="margin-bottom:15px; opacity:0.7;">Enjoying your portraits?</div>
                <a href="https://venmo.com/code?user_id=2277076526694400642&created=1774596396" class="btn-tip">TIP THE TEAM</a>
            </div>
        </div>

        <div class="section-box">
            <span class="section-title">Contact Us</span>
            <form action="https://formspree.io/f/mvzvgvro" method="POST">
                <input type="hidden" name="_subject" value="New Inquiry">
                <label>NAME</label>
                <input type="text" name="name" required>
                <label>EMAIL</label>
                <input type="email" name="email" required>
                <label>PHONE NUMBER</label>
                <input type="tel" name="phone">
                <label>MESSAGE OR FEEDBACK</label>
                <textarea name="message" required></textarea>
                <button type="submit">SEND MESSAGE</button>
            </form>
        </div>
    </div>

    <footer>&copy; 2026 Levy Photos | San Jose, CA</footer>

    <script>
        function checkCode() {
            const code = document.getElementById('eventCode').value.trim().toUpperCase();
            const events = { "01": "https://le-pham-photography.mypixhome.com/instant-gallery/levy-event-studio/" };
            if (events[code]) { window.location.href = events[code]; } 
            else { document.getElementById('error').style.display = "block"; }
        }
    </script>
</body>
</html>
