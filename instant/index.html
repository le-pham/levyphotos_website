<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levy Photos | Professional Photography San Jose</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffffff;
            --accent: #007AFF; 
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            text-align: center;
            padding: 80px 20px;
        }

        .logo {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .logo span { color: var(--accent); }

        .tagline {
            font-size: 18px;
            opacity: 0.7;
            margin-bottom: 60px;
        }

        /* NAVIGATION GRID */
        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 60px;
        }

        .nav-card {
            background: var(--card-bg);
            padding: 40px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 18px;
            transition: transform 0.2s, border 0.2s;
            border: 1px solid transparent;
        }

        .nav-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        /* SPECIAL LIVE BUTTON */
        .live-link {
            grid-column: span 2;
            background: var(--accent);
            padding: 25px;
        }

        footer {
            margin-top: auto;
            padding: 40px;
            font-size: 13px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">LEVY<span>PHOTOS</span></div>
        <div class="tagline">Premium Event Photography & Instant Portrait Stations</div>

        <div class="nav-grid">
            <a href="/live" class="nav-card live-link">FIND YOUR EVENT PHOTOS</a>

            <a href="/wedding" class="nav-card">WEDDINGS</a>
            <a href="/event" class="nav-card">EVENTS</a>
            <a href="/birthday" class="nav-card">BIRTHDAYS</a>
            <a href="/portrait" class="nav-card">PORTRAITS</a>
        </div>

        <div style="opacity: 0.8; line-height: 1.6;">
            Based in San Jose, CA. Specializing in high-end live event 
            coverage and studio-quality instant delivery.
        </div>
    </div>

    <footer>&copy; 2026 Levy Photos</footer>

</body>
</html>
