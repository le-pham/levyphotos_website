    <style>
        :root {
            --primary: #ffffff;
            --accent: #007AFF; 
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --input-bg: #000000;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            text-align: center;
            padding: 60px 20px;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 25px;
        }

        .logo span { color: var(--accent); }

        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            font-weight: 400;
            font-size: 12px;
            margin-top: 0;
            margin-bottom: 80px;
            transition: opacity 0.2s;
            opacity: 0.5;
            letter-spacing: 1px;
        }

        .back-link:hover { opacity: 1; color: var(--accent); }

        .header { margin-bottom: 60px; }
        h1 { font-size: 36px; margin-bottom: 15px; }
        .description { opacity: 0.7; font-size: 18px; line-height: 1.6; max-width: 600px; margin: auto; }

        /* GALLERY GRID (Masonry) */
        .gallery-grid {
            column-count: 3;
            column-gap: 20px;
            margin-top: 40px;
            margin-bottom: 30px;
        }

        @media (max-width: 900px) {
            .gallery-grid { column-count: 2; }
        }

        @media (max-width: 600px) {
            .gallery-grid { column-count: 1; }
        }

        .gallery-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            background: var(--card-bg);
            cursor: pointer;
            border: 1px solid #333;
            transition: transform 0.3s ease, border-color 0.3s;
        }

        .gallery-item:hover {
            transform: scale(1.02);
            border-color: var(--accent);
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* CONTACT FORM */
        .section-box {
            background: var(--card-bg);
            padding: 35px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }

        .contact-form-section {
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            display: block;
        }

        label {
            display: block;
            text-align: left;
            font-size: 13px;
            margin-bottom: 10px;
            opacity: 0.7;
            font-weight: 700;
            letter-spacing: 1px;
        }

        input, textarea {
            width: 100%;
            padding: 18px;
            margin-bottom: 25px;
            border-radius: 12px;
            border: 1px solid #444;
            background: var(--input-bg);
            color: white;
            font-size: 18px;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea { height: 360px; resize: none; }

        button {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
        }

        footer { padding: 60px; font-size: 13px; opacity: 0.6; }

        .contact-details {
            margin-top: 60px;
            margin-bottom: 30px;
            font-size: 20px;
            font-weight: 700;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .contact-details a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }
        .contact-details a:hover {
            color: var(--accent);
        }
    </style>
</head>
