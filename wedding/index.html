<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Portfolio | Levy Photos</title>
    <meta name="description" content="Elegant wedding photography portfolio. Capturing timeless moments and emotions with a premium cinematic style.">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Wedding Portfolio | Levy Photos">
    <meta property="og:description" content="Elegant wedding photography. Capturing timeless moments and emotions with a premium cinematic style.">
    <meta property="og:image" content="https://levyphotos.com/og-image.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffffff;
            --accent: #007AFF; 
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --input-bg: #000000;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            text-align: center;
            padding: 60px 20px;
        }

        .logo { font-size: 32px; font-weight: 700; margin-bottom: 25px; }
        .logo span { color: var(--accent); }

        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            font-weight: 400;
            font-size: 12px;
            margin-top: 60px;
            transition: opacity 0.2s;
            opacity: 0.5;
            letter-spacing: 1px;
        }

        .back-link:hover { opacity: 1; color: var(--accent); }

        h1 { font-size: 32px; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; }

        /* PHOTO MASONRY GRID */
        .portfolio-grid {
            column-count: 2;
            column-gap: 20px;
            margin-bottom: 80px;
        }

        @media (max-width: 768px) {
            .portfolio-grid { column-count: 1; }
        }

        .portfolio-grid img {
            width: 100%;
            margin-bottom: 20px;
            border-radius: 10px;
            display: block;
            transition: opacity 0.3s;
        }

        .portfolio-grid img:hover { opacity: 0.8; }

        /* CONTACT FORM */
        .section-box {
            background: var(--card-bg);
            padding: 35px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }

        .contact-form-section {
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            display: block;
        }

        label {
            display: block;
            text-align: left;
            font-size: 13px;
            margin-bottom: 10px;
            opacity: 0.7;
            font-weight: 700;
            letter-spacing: 1px;
        }

        input, textarea {
            width: 100%;
            padding: 18px;
            margin-bottom: 25px;
            border-radius: 12px;
            border: 1px solid #444;
            background: var(--input-bg);
            color: white;
            font-size: 18px;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea { height: 360px; resize: none; }

        button {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
        }

        footer { padding: 60px; font-size: 13px; opacity: 0.6; }

        .contact-details {
            margin-top: 40px;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: 700;
            opacity: 1;
        }
        .contact-details a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }
        .contact-details a:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="/" style="text-decoration: none; color: inherit;">
            <div class="logo">LEVY<span>PHOTOS</span></div>
        </a>

        <h1>Wedding Portfolio</h1> 
        
        <div class="portfolio-grid">
            <img src="https://via.placeholder.com/600x800/222/fff?text=Photo+1" alt="Portfolio Image">
            <img src="https://via.placeholder.com/600x400/222/fff?text=Photo+2" alt="Portfolio Image">
            <img src="https://via.placeholder.com/600x900/222/fff?text=Photo+3" alt="Portfolio Image">
            <img src="https://via.placeholder.com/600x600/222/fff?text=Photo+4" alt="Portfolio Image">
        </div>

        <div class="section-box contact-form-section">
            <span class="section-title">Contact Us</span>
            <form action="https://formspree.io/f/mvzvgvro" method="POST">
                <input type="hidden" name="_subject" value="New Inquiry">
                <label>NAME</label>
                <input type="text" name="name" required>
                <label>EMAIL</label>
                <input type="email" name="email" required>
                <label>PHONE NUMBER</label>
                <input type="tel" name="phone">
                <label>MESSAGE OR FEEDBACK</label>
                <textarea name="message" required></textarea>
                <button type="submit">SEND MESSAGE</button>
            </form>
        </div>

        <a href="/" class="back-link">← BACK TO HOME</a>
    </div>

    <div class="contact-details">
        <a href="tel:4084017351">408.401.7351</a> &nbsp;&bull;&nbsp; 
        <a href="mailto:hello@levyphotos.com">hello@levyphotos.com</a>
    </div>

    <footer>&copy; 2026 Levy Photos | San Jose, CA</footer>

</body>
</html>
