<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levy Photos | Premium Event Photography San Jose</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffffff;
            --accent: #007AFF; 
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            padding: 80px 20px;
        }

        .logo {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .logo span { color: var(--accent); }

        .tagline {
            font-size: 18px;
            opacity: 0.7;
            margin-bottom: 50px;
            line-height: 1.5;
        }

        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .nav-item {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 18px;
            transition: all 0.2s ease;
            border: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-item:hover {
            border-color: var(--accent);
            transform: scale(1.02);
        }

        .live-btn {
            background: var(--accent);
            border-color: var(--accent);
            margin-bottom: 20px;
        }

        .arrow { opacity: 0.5; font-size: 20px; }

        footer {
            margin-top: auto;
            padding: 40px;
            font-size: 13px;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="/" style="text-decoration: none; color: inherit;">
            <div class="logo">LEVY<span>PHOTOS</span></div>
        </a>

        <div class="tagline">
            Studio-quality portraits.<br>
            Delivered instantly.
        </div>

        <div class="nav-list">
            <a href="/live" class="nav-item live-btn">
                <span>FIND YOUR EVENT PHOTOS</span>
                <span class="arrow">→</span>
            </a>

            <a href="/instant" class="nav-item">
                <span>INSTANT PORTRAIT STATION</span>
                <span class="arrow">→</span>
            </a>

            <a href="/wedding" class="nav-item">
                <span>WEDDING PORTFOLIO</span>
                <span class="arrow">→</span>
            </a>

            <a href="/event" class="nav-item">
                <span>EVENT PORTFOLIO</span>
                <span class="arrow">→</span>
            </a>

            <a href="/birthday" class="nav-item">
                <span>BIRTHDAY PORTFOLIO</span>
                <span class="arrow">→</span>
            </a>
        </div>
    </div>

    <footer>&copy; 2026 Levy Photos | San Jose, CA</footer>

</body>
</html>
