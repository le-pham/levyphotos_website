<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levy Photos | Live Event Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffffff;
            --secondary: #a0a0a0;
            --accent: #007AFF; 
            --slate-btn: #2c2c2e; /* Apple-style dark gray/slate */
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --input-bg: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding-top: 50px;
            padding-bottom: 50px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 20px;
        }

        .logo span {
            color: var(--accent);
        }

        .about-top {
            font-size: 16px;
            line-height: 1.6;
            opacity: 0.85;
            margin-bottom: 40px;
            padding: 0 15px;
        }

        .hero-text {
            font-size: 18px;
            margin-bottom: 25px;
            opacity: 0.9;
            font-weight: 700;
        }

        .section-box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }

        label {
            display: block;
            text-align: left;
            font-size: 11px;
            margin-bottom: 8px;
            opacity: 0.5;
            font-weight: 700;
            letter-spacing: 1px;
        }

        input[type="text"], input[type="email"], textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            background: var(--input-bg);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            font-family: inherit;
        }

        input[type="text"]:focus, input[type="email"]:focus, textarea:focus {
            border-color: var(--accent);
            outline: none;
        }

        textarea {
            height: 180px; 
            resize: none;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        /* --- Updated Sophisticated Slate Tip Button --- */
        .btn-tip {
            background: var(--slate-btn);
            text-decoration: none;
            display: block;
            padding: 15px;
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 700;
            font-size: 15px;
            margin-top: 15px;
            transition: transform 0.2s, background-color 0.2s, border 0.2s;
            border: 1px solid #3a3a3c;
        }

        .btn-tip:hover {
            background: #3a3a3c;
            border-color: #48484a;
        }

        button:active, .btn-tip:active {
            transform: scale(0.98);
        }

        .contact-section-subtle {
            margin-top: 10px;
            padding-top: 30px;
            text-align: center;
            width: 100%;
        }

        .contact-section-subtle a {
            display: block;
            color: var(--primary);
            text-decoration: none;
            font-size: 18px; 
            font-weight: 400;
            margin-bottom: 12px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        footer {
            margin-top: auto;
            padding: 40px 20px;
            font-size: 11px;
            opacity: 0.4;
            text-align: center;
            width: 100%;
        }

        .error-msg {
            color: #ff453a;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }

        h3 {
            margin-top: 0;
            font-size: 20px;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">LEVY<span>PHOTOS</span></div>
        
        <div class="about-top">
            We provide studio-quality portraits delivered instantly to your device at high-end weddings and events.
        </div>
        
        <div class="hero-text">Access Your Event Gallery</div>
        <div class="section-box">
            <input type="text" id="eventCode" placeholder="ENTER EVENT CODE" style="text-align: center; text-transform: uppercase;">
            <button onclick="checkCode()">VIEW PHOTOS</button>
            <div id="error" class="error-msg">Code not found.</div>
            
            <div style="margin-top: 35px; border-top: 1px solid #333; padding-top: 25px;">
                <div style="font-size: 13px; opacity: 0.6; margin-bottom: 12px;">Enjoying your portraits?</div>
                <a href="https://venmo.com/code?user_id=2277076526694400642&created=1774596396" class="btn-tip">TIP THE TEAM</a>
            </div>
        </div>

        <div class="section-box">
            <h3>Book an Event</h3>
            <form action="https://formspree.io/f/mvzvgvro" method="POST">
                <input type="hidden" name="_subject" value="New Levy Photos Inquiry">
                <label>NAME</label>
                <input type="text" name="name" required>
                
                <label>EMAIL</label>
                <input type="email" name="email" required>
                
                <label>EVENT DETAILS</label>
                <textarea name="message" placeholder="Date, Venue, or Event Type..." required></textarea>
                
                <button type="submit">SEND INQUIRY</button>
            </form>
        </div>

        <div class="contact-section-subtle">
            <a href="tel:4084017351">408.401.7351</a>
            <a href="mailto:hello@levyphotos.com">hello@levyphotos.com</a>
        </div>
    </div>

    <footer>
        &copy; 2026 Levy Photos | San Jose, CA
    </footer>

    <script>
        function checkCode() {
            const code = document.getElementById('eventCode').value.trim().toUpperCase();
            const error = document.getElementById('error');
            const events = {
                "01": "https://le-pham-photography.mypixhome.com/instant-gallery/levy-event-studio/", 
                "GALA20": "https://zno.instant.link/demo2", 
                "TEST": "https://zno.instant.link/demo3"  
            };
            if (events[code]) {
                error.style.display = "none";
                window.location.href = events[code];
            } else {
                error.style.display = "block";
            }
        }
        document.getElementById("eventCode").addEventListener("keyup", function(event) {
            if (event.keyCode === 13) { checkCode(); }
        });
    </script>

</body>
</html>
